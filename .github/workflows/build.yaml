name: Build ROS2 package

env:
  PACKAGE_NAME: "adi_iio"

on:
  workflow_dispatch:
  pull_request:
  merge_group:
  push:
    branches:
      - humble
      - humble-develop
      - main

permissions:
  contents: read
  checks: write

jobs:
  build-package:
    name: ROS ${{ matrix.ros_distribution }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ros_distribution:
          - jazzy
        include:
          # Jazzy Jalisco (May 2024 - May 2029)
          - docker_image: ubuntu:noble
            ros_distribution: jazzy
            ros_version: 2
    container:
      image: ${{ matrix.docker_image }}

    steps:
      - name: Setup workspace
        run: mkdir -p ros_ws/src

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          path: ros2_ws/src

      - name: Setup ROS environment
        uses: ros-tooling/setup-ros@649ef6bcd696da05bc27ceb3fab69d810c0daeab # v0.7.19
        with:
          required-ros-distributions: ${{ matrix.ros_distribution }}
          use-ros2-testing: false

      - name: Build the package
        id: action_ros_ci_step
        uses: ros-tooling/action-ros-ci@3a640b10f09b756dabe556dac5413aba369f71b0 # 0.4.8
        with:
          package-name: ${{ env.PACKAGE_NAME }}
          target-ros2-distro: ${{ matrix.ros_distribution }}
          skip-tests: true
          import-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Store the build logs
        uses: actions/upload-artifact@v4
        with:
          name: colcon-logs
          path: ${{ steps.action_ros_ci_step.outputs.ros-workspace-directory-name }}/log
        if: always() # upload the logs even when the build fails
