name: Lint ROS2 package

on:
  push:
    branches: [ "*", "ci*"]
    tags: [ "v*" ]
  pull_request:
    branches: [ "humble", "humble-develop", "main" ]
  workflow_dispatch:

env:
  PACKAGE_NAME: "adi_iio"

jobs:
  ament_lint:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        ROS_DISTRIBUTION: [humble]
        linter:
          - cppcheck
          # - cpplint # TBD
          - uncrustify
          # - flake8 # TBD
          - pep257
          - lint_cmake
          - xmllint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup ROS environment
        uses: ros-tooling/setup-ros@v0.7

      - name: Run Linter
        env:
          AMENT_CPPCHECK_ALLOW_SLOW_VERSIONS: 1
        uses: ros-tooling/action-ros-lint@master
        with:
          linter: ${{ matrix.linter }}
          distribution: ${{ matrix.ROS_DISTRIBUTION }}
          package-name: ${{ env.PACKAGE_NAME }}

  pre_commit:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup ROS environment
        uses: ros-tooling/setup-ros@v0.7

      - name: Run pre-commit-checks
        run: |
          make fix
          FIX_STATUS=$?

          make check
          CHECK_STATUS=$?

          if [ $FIX_STATUS -ne 0 ] || [ $CHECK_STATUS -ne 0 ]; then
            echo "Pre-commit checks failed. Please fix the issues and try again."
            exit 1
          fi